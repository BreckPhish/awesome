<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#b4541b" />
<title>Dough Counter</title>
<style>
  :root {
    --bg: #f4efe9;
    --card: #ffffff;
    --ink: #2b2622;
    --muted: #8a7f76;
    --line: #e4dcd2;
    --accent: #b4541b;
    --accent-soft: #fbeee4;
    --ok: #2f7d4f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.4;
    padding: 16px;
    max-width: 560px;
    margin: 0 auto;
    padding-bottom: 48px;
  }
  h1 {
    font-size: 1.5rem;
    margin: 4px 0 2px;
  }
  .sub { color: var(--muted); font-size: .85rem; margin: 0 0 18px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .card h2 {
    font-size: 1.05rem;
    margin: 0 0 2px;
  }
  .card .hint { color: var(--muted); font-size: .8rem; margin: 0 0 12px; }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-top: 1px solid var(--line);
  }
  .row:first-of-type { border-top: none; }
  .row .label { font-size: .95rem; }
  .row .label small { display: block; color: var(--muted); font-size: .72rem; }

  .stepper { display: flex; align-items: center; gap: 6px; }
  .stepper button {
    width: 40px; height: 40px;
    border: 1px solid var(--line);
    background: #faf6f1;
    border-radius: 10px;
    font-size: 1.4rem;
    color: var(--accent);
    cursor: pointer;
    line-height: 1;
    flex: 0 0 auto;
  }
  .stepper button:active { background: var(--accent-soft); }
  .stepper input {
    width: 64px; height: 40px;
    text-align: center;
    font-size: 1.1rem;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    -moz-appearance: textfield;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .output {
    background: #2b2622;
    color: #f4efe9;
    border-radius: 14px;
    padding: 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 1.05rem;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 12px;
  }
  .actions { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { background: #97440f; }
  .btn-ghost { background: #efe7dd; color: var(--ink); }
  .btn-ghost:active { background: #e4dacd; }
  .copied { color: var(--ok); font-weight: 700; }

  .totals { font-size: .85rem; color: var(--muted); margin-top: 10px; }
  .totals span { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
  <h1>🍕 Dough Counter</h1>
  <p class="sub">Enter trays &amp; doughs by location, then copy the report.</p>

  <!-- Location 1 -->
  <section class="card" data-location="1">
    <h2>Location 1</h2>
    <p class="hint">B1 doughs (counted individually)</p>
    <div class="row">
      <div class="label">B1 <small>doughs</small></div>
      <div class="stepper" data-field="loc1_b1"></div>
    </div>
  </section>

  <!-- Location 2 -->
  <section class="card" data-location="2">
    <h2>Location 2</h2>
    <p class="hint">A1 &amp; A2 trays</p>
    <div class="row">
      <div class="label">A1 <small>trays &times; 15</small></div>
      <div class="stepper" data-field="loc2_a1"></div>
    </div>
    <div class="row">
      <div class="label">A2 <small>trays &times; 8</small></div>
      <div class="stepper" data-field="loc2_a2"></div>
    </div>
  </section>

  <!-- Location 3 -->
  <section class="card" data-location="3">
    <h2>Location 3</h2>
    <p class="hint">A1 &amp; A2 trays, plus B1 &amp; B2 doughs</p>
    <div class="row">
      <div class="label">A1 <small>trays &times; 15</small></div>
      <div class="stepper" data-field="loc3_a1"></div>
    </div>
    <div class="row">
      <div class="label">A2 <small>trays &times; 8</small></div>
      <div class="stepper" data-field="loc3_a2"></div>
    </div>
    <div class="row">
      <div class="label">B1 <small>doughs</small></div>
      <div class="stepper" data-field="loc3_b1"></div>
    </div>
    <div class="row">
      <div class="label">B2 <small>tubs</small></div>
      <div class="stepper" data-field="loc3_b2"></div>
    </div>
  </section>

  <!-- Output -->
  <section class="card">
    <h2>Report</h2>
    <div class="output" id="output"></div>
    <div class="actions">
      <button class="btn btn-primary" id="copyBtn">Copy text</button>
      <button class="btn btn-ghost" id="resetBtn">Reset</button>
    </div>
    <div class="totals" id="totals"></div>
  </section>

<script>
  // ---- Configuration -------------------------------------------------
  // Doughs per tray for the tray-counted types.
  const DOUGHS_PER_TRAY = { a1: 15, a2: 8 };

  // Every numeric input field in the app.
  const FIELDS = [
    "loc1_b1",
    "loc2_a1", "loc2_a2",
    "loc3_a1", "loc3_a2", "loc3_b1", "loc3_b2",
  ];

  const STORAGE_KEY = "doughCounter.v1";

  // ---- State ---------------------------------------------------------
  let state = loadState();

  function loadState() {
    const blank = Object.fromEntries(FIELDS.map(f => [f, 0]));
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      return { ...blank, ...saved };
    } catch (e) {
      return blank;
    }
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  // ---- Build the steppers -------------------------------------------
  document.querySelectorAll(".stepper").forEach(stepper => {
    const field = stepper.dataset.field;
    stepper.innerHTML =
      '<button type="button" data-step="-1" aria-label="minus">&minus;</button>' +
      '<input type="number" inputmode="numeric" min="0" step="1" />' +
      '<button type="button" data-step="1" aria-label="plus">+</button>';

    const input = stepper.querySelector("input");
    input.value = state[field];

    input.addEventListener("input", () => {
      state[field] = sanitize(input.value);
      render();
    });
    input.addEventListener("blur", () => { input.value = state[field]; });

    stepper.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        const next = state[field] + Number(btn.dataset.step);
        state[field] = Math.max(0, next);
        input.value = state[field];
        render();
      });
    });
  });

  function sanitize(v) {
    const n = Math.floor(Number(v));
    return Number.isFinite(n) && n > 0 ? n : 0;
  }

  // ---- Totals & report ----------------------------------------------
  function compute() {
    const a1 = (state.loc2_a1 + state.loc3_a1) * DOUGHS_PER_TRAY.a1;
    const a2 = (state.loc2_a2 + state.loc3_a2) * DOUGHS_PER_TRAY.a2;
    const b1 = state.loc1_b1 + state.loc3_b1;
    const b2 = state.loc3_b2;
    return { a1, a2, b1, b2 };
  }

  function buildReport(t) {
    return (
      "3D: " + t.b1 + " + " + t.b2 + " tubs\n" +
      "PF: " + t.a1 + "\n" +
      "TP: " + t.a2
    );
  }

  function render() {
    const t = compute();
    document.getElementById("output").textContent = buildReport(t);
    document.getElementById("totals").innerHTML =
      "A1 trays: <span>" + (state.loc2_a1 + state.loc3_a1) + "</span> &middot; " +
      "A2 trays: <span>" + (state.loc2_a2 + state.loc3_a2) + "</span> &middot; " +
      "B1: <span>" + t.b1 + "</span> &middot; " +
      "B2: <span>" + t.b2 + "</span>";
    saveState();
  }

  // ---- Buttons -------------------------------------------------------
  const copyBtn = document.getElementById("copyBtn");
  copyBtn.addEventListener("click", async () => {
    const text = buildReport(compute());
    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      // Fallback for browsers without the async clipboard API.
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    const original = copyBtn.textContent;
    copyBtn.textContent = "Copied ✓";
    copyBtn.classList.add("copied");
    setTimeout(() => {
      copyBtn.textContent = original;
      copyBtn.classList.remove("copied");
    }, 1400);
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("Reset all counts to zero?")) return;
    FIELDS.forEach(f => state[f] = 0);
    document.querySelectorAll(".stepper input").forEach((input, i) => {
      input.value = 0;
    });
    render();
  });

  render();
</script>
</body>
</html>
